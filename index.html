<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System</title>
<meta name="robots" content="noindex, nofollow">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    height: 100%;
    background: black;
    overflow: hidden;
}

img {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100dvh;
    object-fit: cover;
}

/* PRZYCISK */
button {
    position: fixed;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    padding: 18px 40px;
    font-size: 22px;
    font-weight: bold;
    background: red;
    color: white;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 0 25px red;
    animation: pulse 1s infinite;
    z-index: 10;
}

@keyframes pulse {
    0% { box-shadow: 0 0 10px red; }
    50% { box-shadow: 0 0 40px red; }
    100% { box-shadow: 0 0 10px red; }
}
</style>
</head>

<body>

<img src="IMG_20260301_102850.png">

<button onclick="downloadFile()">🔴 KLIKNIJ JUŻ</button>

<script>
function downloadFile() {
    const link = document.createElement('a');
    link.href = "niespodzianka.txt";
    link.download = "niespodzianka.txt";
    link.click();
}
</script>

</body>
</html>
